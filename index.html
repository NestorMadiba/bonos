<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Bonos - Colegio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-900 text-white p-4 flex justify-between">
        <div class="font-bold">Sistema de Bonos</div>
        <button id="logout-btn" onclick="logout()" class="hidden bg-red-600 px-3 py-1 rounded text-sm">Cerrar Sesión</button>
    </nav>

    <main class="p-6 max-w-4xl mx-auto">
        <div id="login-box" class="bg-white p-8 rounded shadow max-w-md mx-auto">
            <img src="./bonobachi.png" class="mb-4 rounded">
            <input type="email" id="email" placeholder="Email" class="w-full border p-2 mb-2">
            <input type="password" id="pass" placeholder="Contraseña" class="w-full border p-2 mb-4">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded">Ingresar</button>
        </div>

        <div id="admin-box" class="hidden">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <button onclick="showConfig()" class="bg-white p-4 shadow rounded">Configuración</button>
                <button onclick="showAssign()" class="bg-white p-4 shadow rounded">Asignar Bono</button>
                <button onclick="showVincular()" class="bg-white p-4 shadow rounded border-2 border-blue-500">Vincular Padre-Hijo</button>
                <button onclick="showInformes()" class="bg-white p-4 shadow rounded">Informes</button>
            </div>
            <div id="admin-content" class="bg-white p-6 rounded shadow"></div>
        </div>
    </main>

    <script>
        const supabase = supabase.createClient('https://nujjafazakbcokxmcadm.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51amphZmF6YWtiY29reG1jYWRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTk4NjUsImV4cCI6MjA5Nzc5NTg2NX0.Ym4eb1NAyspMFJruh6UTJUhT1xD5lVP0z9zWemI3cBg');

        async function login() {
            const { error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('pass').value
            });
            if(error) alert(error.message); else location.reload();
        }

        async function logout() { await supabase.auth.signOut(); location.reload(); }

        // VINCULACIÓN PADRE-HIJO
        async function showVincular() {
            document.getElementById('admin-content').innerHTML = `
                <h3 class="font-bold mb-4">Vincular Padre a Alumno</h3>
                <input type="text" id="parent-id" placeholder="ID (UUID) del Padre" class="w-full border p-2 mb-2">
                <input type="text" id="student-id" placeholder="ID (UUID) del Alumno" class="w-full border p-2 mb-2">
                <button onclick="vincular()" class="bg-blue-600 text-white px-4 py-2 rounded">Realizar Vinculación</button>
            `;
        }

        async function vincular() {
            const pId = document.getElementById('parent-id').value;
            const sId = document.getElementById('student-id').value;
            const { error } = await supabase.from('parent_students').insert({ parent_id: pId, student_id: sId });
            if(error) alert(error.message); else alert('Vinculado con éxito');
        }

        // CHEQUEO SESIÓN
        supabase.auth.onAuthStateChange((event, session) => {
            if(session) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-box').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
